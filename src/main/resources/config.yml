# ============================================================================ #
#                       ClearLaggEnhanced Configuration                        #
# ============================================================================ #
# This is the main configuration file that controls which modules are enabled.
# Each module has its own configuration in resources/module/<module-name>/
#
# NOTE: Configuration has been moved to a modular system!
# Old config.yml settings are now in:
#   - Entity Clearing: module/entity-clearing/config.yml
#   - Mob Limiter: module/mob-limiter/config.yml
#   - Spawner Limiter: module/spawner-limiter/config.yml
#   - Misc Entity Limiter: module/misc-entity-limiter/config.yml
#   - Chunk Finder: module/chunk-finder/config.yml
#   - Performance: module/performance/config.yml

# Database Settings
# Supports SQLite and MySQL.
# database.file is used only when database.type=sqlite.
# database.mysql.* is used only when database.type=mysql.
# Switching database.type changes where data is stored, but does not migrate existing data.
database:
  enabled: true
  type: "sqlite"
  file: "clearlagg.db"
  mysql:
    host: "localhost"
    port: 3306
    database: "clearlagg"
    username: "root"
    password: "password"
    ssl-mode: "PREFERRED"
    properties: {}
  pool:
    maximum-pool-size: 10
    minimum-idle: 2
    connection-timeout-ms: 10000
    idle-timeout-ms: 600000
    max-lifetime-ms: 1800000
    keepalive-time-ms: 0
    validation-timeout-ms: 5000

# Module System
# Enable or disable individual feature modules
# Each module's specific configuration is in resources/module/<module-name>/config.yml
modules:
  entity-clearing: true
  mob-limiter: true
  spawner-limiter: true
  misc-entity-limiter: true
  chunk-finder: true
  performance: true
