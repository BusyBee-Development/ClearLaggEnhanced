# Default/fallback time in seconds between clears.
interval: 600

# Optional adaptive interval scheduling.
# The interval is re-evaluated at the start of each new clearing cycle.
# The highest matching threshold wins. If no tier matches, the base interval above is used.
# Use ENTITY_COUNT to base the interval on the currently loaded entities in the configured worlds.
# Use PLAYER_COUNT to base the interval on the current online player count.
adaptive-interval:
  enabled: true
  metric: "ENTITY_COUNT" # ENTITY_COUNT | PLAYER_COUNT
  tiers:
    - threshold: 0
      interval: 300
    - threshold: 10000
      interval: 240
    - threshold: 15000
      interval: 180
    - threshold: 20000
      interval: 120

# Optional MSPT performance gate.
# When enabled, automatic clearing is deferred while the server is healthy.
# Clears are only allowed once the average MSPT has stayed at or above the threshold
# for the configured sustained duration.
performance-gate:
  enabled: true
  mspt-threshold: 45.0
  sustained-seconds: 180

protect-named-entities: true
protect-tamed-entities: true
protect-armored-entities: true
protect-stacked-entities: false
whitelist-all-mobs: false

