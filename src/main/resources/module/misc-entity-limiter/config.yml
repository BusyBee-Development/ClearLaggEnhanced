# Legacy key: ignored at runtime. Use config.yml modules.misc-entity-limiter instead.
enabled: true

limits-per-chunk:
  ARMOR_STAND: -1
  BOAT: 5
  CHEST_BOAT: 5
  MINECART: 5
  ITEM_FRAME: -1
  GLOW_ITEM_FRAME: -1
  LEASH_HITCH: -1
  PAINTING: 5

protect:
  named: true
  tags:
    - "CLE_PROTECTED"

sweep:
  interval-ticks: 100
  max-chunks-per-tick: 20

notify:
  admins-permission: "CLE.admin"
  throttle-seconds: 60

worlds: []
